apiVersion: apps/v1
kind: Deployment
metadata:
  name: member
  namespace: quietchatter
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: member
  template:
    metadata:
      labels:
        app: member
    spec:
      nodeSelector:
        quietchatter.io/role: worker
      containers:
        - name: member
          image: maskun2/quietchatter-microservice-member:IMAGE_PLACEHOLDER
          ports:
            - containerPort: 8083
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SERVER_PORT
              value: "8083"
            - name: DB_URL
              value: jdbc:postgresql://quietchatter-db.cpq8skgs4o7i.ap-northeast-2.rds.amazonaws.com:5432/rdb-microservice-member
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: quietchatter-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: quietchatter-secrets
                  key: DB_PASSWORD
            - name: INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: quietchatter-secrets
                  key: INTERNAL_SECRET
            - name: NAVER_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: quietchatter-secrets
                  key: NAVER_CLIENT_ID
            - name: NAVER_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: quietchatter-secrets
                  key: NAVER_CLIENT_SECRET
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: quietchatter-secrets
                  key: JWT_SECRET_KEY
            - name: KAFKA_BROKERS
              value: redpanda.quietchatter.svc.cluster.local:9092
            - name: SPRING_DATA_REDIS_HOST
              value: redis.quietchatter.svc.cluster.local
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
            - name: JAVA_OPTS
              value: "-Xms64m -Xmx192m -XX:MaxMetaspaceSize=196m -XX:+UseSerialGC -Xss512k"
          resources:
            limits:
              memory: 450Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: member
  namespace: quietchatter
spec:
  selector:
    app: member
  ports:
    - port: 8083
      targetPort: 8083
