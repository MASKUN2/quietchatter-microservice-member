server:
  port: 8080

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: microservice-member
  
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/microservice-member}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  flyway:
    enabled: true
    baseline-on-migrate: true

  config:
    import: "optional:consul:"
  cloud:
    stream:
      kafka:
        binder:
          brokers: ${KAFKA_BROKERS:localhost:19092}
        bindings:
          memberEvents-in-0:
            consumer:
              enableDlq: true
              dlqName: member.dlq
      bindings:
        memberEvents-out-0:
          destination: member
          content-type: application/json
        memberEvents-in-0:
          destination: member
          group: ${spring.application.name}-group
          consumer:
            max-attempts: 3
            back-off-initial-interval: 1000
            back-off-max-interval: 10000
            back-off-multiplier: 2.0
    consul:
      host: ${CONSUL_HOST:localhost}
      port: 8500
      discovery:
        service-name: microservice-member
        instance-id: ${spring.application.name}:${server.port}

jwt:
  secret-key: ${JWT_SECRET_KEY:veryveryveryveryLongSecretKeyForLocalDevelopment}

app:
  cookie:
    domain: ${COOKIE_DOMAIN:localhost}
    secure: ${COOKIE_SECURE:false}
    same-site: ${COOKIE_SAMESITE:Lax}

naver:
  api:
    client-id: ${NAVER_CLIENT_ID:placeholder}
    client-secret: ${NAVER_CLIENT_SECRET:placeholder}
