server:
  port: 8081

spring:
  application:
    name: microservice-member
  config:
    import: "optional:consul:"
  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        service-name: microservice-member
        instance-id: ${spring.application.name}:${server.port}

jwt:
  secret-key: your-very-long-secret-key-at-least-32-chars-long

app:
  cookie:
    domain: localhost
    secure: false
    same-site: Lax

naver:
  api:
    client-id: ${NAVER_CLIENT_ID:placeholder}
    client-secret: ${NAVER_CLIENT_SECRET:placeholder}
