server:
  port: 8080

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: microservice-member
  
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/rdb-microservice-member}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  flyway:
    enabled: true
    baseline-on-migrate: true

  config:
    import: 
      - "optional:consul:"
      - "optional:aws-secretsmanager:quietchatter-naver-client-id"
      - "optional:aws-secretsmanager:quietchatter-naver-client-secret"
  cloud:
    function:
      autodetect: false
    stream:
      function:
        autodetect: false
        definition: ""
      kafka:
        binder:
          brokers: ${KAFKA_BROKERS:localhost:19092}
          configuration:
            schema.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8081}
        bindings:
          memberEvents-in-0:
            consumer:
              enableDlq: true
              dlqName: member.dlq
      bindings:
        memberEvents-out-0:
          destination: member
          content-type: application/*+avro
        memberEvents-in-0:
          destination: member
          group: ${spring.application.name}-group
          content-type: application/*+avro
          consumer:
            max-attempts: 3
            back-off-initial-interval: 1000
            back-off-max-interval: 10000
            back-off-multiplier: 2.0
    consul:
      host: ${CONSUL_HOST:localhost}
      port: 8500
      discovery:
        service-name: microservice-member
        instance-id: ${spring.application.name}:${server.port}
    aws:
      region:
        static: ${AWS_REGION:ap-northeast-2}
      secretsmanager:
        enabled: ${AWS_SECRETSMANAGER_ENABLED:true}

jwt:
  secret-key: ${quietchatter-jwt-secret-key:veryveryveryveryLongSecretKeyForLocalDevelopment}

app:
  cookie:
    domain: ${COOKIE_DOMAIN:localhost}
    secure: ${COOKIE_SECURE:false}
    same-site: ${COOKIE_SAMESITE:Lax}

naver:
  api:
    client-id: ${quietchatter-naver-client-id:placeholder}
    client-secret: ${quietchatter-naver-client-secret:placeholder}

